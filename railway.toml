[build]
builder = "NIXPACKS"

[deploy]
# Long-running bot process — Railway treats this as a worker, not a web service.
startCommand = "python main.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Healthcheck intentionally omitted. The bot is a pure Telegram worker — it
# doesn't serve HTTP. main.py starts a tiny aiohttp-less HTTP listener on
# PORT (default 8080) just so Railway's healthcheck has *something* to hit;
# Railway's dashboard may still complain about the missing healthcheckPath
# even with this server running, which is harmless.
